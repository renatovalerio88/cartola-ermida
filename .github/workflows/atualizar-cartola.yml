name: Atualizar Cartola

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Executar atualização
        run: |
          python roteiros/atualizar_cartola.py

      - name: Salvar histórico
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add histórico_cartola.json

          git commit -m "Atualiza histórico Cartola" || echo "Nada para atualizar"

          git push
