name: Atualizar Cartola

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar status do mercado
        id: mercado
        run: |
          python - <<'PY'
          import json
          import urllib.request
          import os

          url = "https://api.cartola.globo.com/mercado/status"

          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/json",
                  "User-Agent": "Mozilla/5.0",
              }
          )

          with urllib.request.urlopen(req) as resposta:
              dados = json.loads(resposta.read().decode("utf-8"))

          rodada = int(dados.get("rodada_atual", 0) or 0)
          status = int(dados.get("status_mercado", 0) or 0)

          print(f"Rodada atual: {rodada}")
          print(f"Status mercado: {status}")

          # 1 = mercado aberto
          # diferente de 1 = mercado fechado, rodada em andamento ou manutenção
          deve_atualizar = status != 1

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"rodada={rodada}\n")
              out.write(f"status={status}\n")
              out.write(f"deve_atualizar={'true' if deve_atualizar else 'false'}\n")
          PY

      - name: Mostrar decisão
        run: |
          echo "Rodada: ${{ steps.mercado.outputs.rodada }}"
          echo "Status mercado: ${{ steps.mercado.outputs.status }}"
          echo "Deve atualizar automaticamente: ${{ steps.mercado.outputs.deve_atualizar }}"
          echo "Tipo de execução: ${{ github.event_name }}"

      - name: Executar atualização
        if: github.event_name == 'workflow_dispatch' || steps.mercado.outputs.deve_atualizar == 'true'
        run: |
          ARQUIVO=$(find . -name "atualizar_cartola.py" | head -n 1)
          echo "Arquivo encontrado: $ARQUIVO"
          python "$ARQUIVO"

          echo "---------------------"
          echo "Atualizando rodada atual"
          echo "---------------------"

          ARQUIVO_RODADA=$(find . -name "atualizar_rodada_atual.py" | head -n 1)
          echo "Arquivo encontrado: $ARQUIVO_RODADA"
          python "$ARQUIVO_RODADA"

      - name: Salvar histórico e rodada atual
        if: github.event_name == 'workflow_dispatch' || steps.mercado.outputs.deve_atualizar == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add historico_cartola.json rodada_atual_cartola.json

          git commit -m "Atualiza dados Cartola" || echo "Nada para atualizar"

          git push

      - name: Nenhuma atualização necessária
        if: github.event_name != 'workflow_dispatch' && steps.mercado.outputs.deve_atualizar != 'true'
        run: |
          echo "Mercado aberto. Atualização automática ignorada."
          echo "Nenhum arquivo foi alterado."
